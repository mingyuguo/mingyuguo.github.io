- date: Jul 2026
  text_html: >-
    How can we coordinate multiple sponsors for generative advertising? Our latest collaboration with <b>CMU</b>, <b>Oxford</b>, and <b>Harvard</b> has been accepted to the <b>Conference on Language Modeling (COLM) 2026</b>! Read the full paper on arXiv: <a href="https://arxiv.org/abs/2604.06263v1">Incentive-Aware Multi-Fidelity Optimization for Generative Advertising in Large Language Models</a>.
- date: Jun 2026
  text_html: >-
    I secured a new <b>National Industry PhD project with DDDI Group</b> under the Australian Government's National Industry PhD Program. The project will investigate AI for optimal land subdivision and navigation of planning policy and council regulations.
- date: May 2026
  text_html: >-
    Our latest collaboration with <b>CMU</b> explores robust multi-agent LLM reasoning under adversarial majorities. Read the full paper on arXiv: <a href="https://arxiv.org/abs/2604.17139">The Consensus Trap: Rescuing Multi-Agent LLMs from Adversarial Majorities via Token-Level Collaboration</a>.
- date: May 2026
  text_html: >-
    Huge congratulations to PhD student <b>Jialiang Li</b>! His paper, <em>Taming Treewidth DP with Modulators: A General Booster for Graph Heuristics</em>, was accepted to <b>IJCAI 2026</b>. This work presents key findings from his MPhil thesis.
- date: Apr 2026
  text_html: >-
    <b>Shiman Sheng</b> started her PhD.
- date: Mar 2026
  text_html: >-
    Congratulations to my PhD student, <b>Grant Douglas</b>, on his <b>Best Student Paper Nomination</b> at <b>AAMAS</b> (the flagship international conference for autonomous agents) for his paper <em>Building Large-Scale Drone Defenses from Small-Team Strategies</em>.
- date: Feb 2026
  text_html: >-
    I was appointed <b>Graduate Research Coordinator</b> of the School of Computer Science and Information Technology, supporting research excellence, mentorship, and impactful graduate research at Adelaide University.
- date: Jan 2026
  text_html: >-
    <b>Quang Huy Ngo</b> completed his PhD and received the <b>Dean's Commendation for Doctoral Thesis Excellence</b>.
- date: Dec 2025
  text_html: >-
    The paper <em>Building Large-Scale Drone Defenses from Small-Team Strategies</em> was accepted to <b>AAMAS 2026</b> as an oral presentation (<b>CORE A</b>).
- date: Dec 2025
  text_html: >-
    I received the Faculty of Science, Engineering and Technology <b>Executive Dean's International Engagement Award</b> for International Partnership, while also completing my term as Associate Head International of the School of Computer and Mathematical Sciences (2023, 2025).
- date: Dec 2025
  text_html: >-
    <b>Jinyang Li</b> started his PhD.
- date: Nov 2025
  text_html: >-
    The paper <em>On the Edge of Core (Non-)emptiness: An Automated Reasoning Approach to Approval-based Multi-winner Voting</em> was accepted to <b>AAAI 2026</b> as an oral presentation.
- date: Nov 2025
  text_html: >-
    <b>Felix Lysander Buecheler</b> started his PhD on advertising frameworks and auctions for large language model chats, co-supervised with Dr. Jiarui Gan at Oxford.
- date: Sept 2025
  text_html: >-
    I represented Adelaide University at the China International Fair for Trade in Services (CIFTIS), participated in the Adelaide University China Open Days, and joined the SET faculty mission to Vietnam.
- date: Sept 2025
  text_html: >-
    The paper <em>Can Dependencies Induced by LLM-Agent Workflows Be Trusted?</em> was accepted to <b>NeurIPS 2025</b>.
- date: July 2025
  text_html: >-
    I was appointed <b>Acting Associate Dean International (North and East Asia)</b>, Faculty of Science, Engineering and Technology (acting period: July-September).
- date: May 2025
  text_html: >-
    <b>Jialiang Li</b> completed his MPhil and continued to an industry PhD co-funded by SA Pathology.
